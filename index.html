<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Governance Assessments</title>
    <meta name="description" content="Free AI readiness and controls framework assessments for CPA firms and compliance leaders. Built by a CPA/CISA with deep AI governance expertise.">
    
    <!-- React and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // FOOTER COMPONENT - Shows on all screens
        // ============================================
        function Footer() {
            return (
                <div style={{ 
                    borderTop: '1px solid rgba(255,255,255,0.1)',
                    padding: '24px 20px',
                    textAlign: 'center',
                    background: 'transparent',
                    marginTop: 'auto'
                }}>
                    <div style={{ fontSize: 13, color: '#64748B', marginBottom: 8 }}>
                        Built by <strong style={{ color: '#334155' }}>Bill Long, CGEIT CISM CISA</strong>
                    </div>
                    <div style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap' }}>
                        <a href="https://linkedin.com/in/norrislong" target="_blank" rel="noopener" style={{ color: '#2563EB', textDecoration: 'none', fontSize: 13 }}>
                            LinkedIn
                        </a>
                        <span style={{ color: '#CBD5E1' }}>•</span>
                        <a href="mailto:wlong@norrislong.com" style={{ color: '#2563EB', textDecoration: 'none', fontSize: 13 }}>
                            Email
                        </a>
                    </div>
                    <div style={{ fontSize: 11, color: '#94A3B8', marginTop: 12 }}>
                        Former SOC 2 auditor • AI governance specialist
                    </div>
                </div>
            );
        }

        // ============================================
        // EMAIL CAPTURE COMPONENT
        // ============================================
        function EmailCapture({ assessmentType, scores, onSkip }) {
            const [email, setEmail] = useState('');
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);

            async function handleSubmit(e) {
                e.preventDefault();
                setLoading(true);

                // TODO: Replace with actual API endpoint
                try {
                    await fetch('/api/submit-assessment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            assessmentType,
                            email,
                            scores,
                            timestamp: new Date().toISOString()
                        })
                    });
                    setSubmitted(true);
                } catch (error) {
                    console.error('Error submitting:', error);
                    setSubmitted(true); // Continue anyway for now
                }
                
                setLoading(false);
            }

            if (submitted) {
                return (
                    <div style={{ padding: '16px 20px', background: '#F0FDF4', border: '1px solid #BBF7D0', borderRadius: 10, marginTop: 20 }}>
                        <div style={{ fontSize: 14, color: '#166534', fontWeight: 600, marginBottom: 4 }}>
                            ✓ Results sent!
                        </div>
                        <div style={{ fontSize: 13, color: '#15803D' }}>
                            Check your email for a detailed breakdown. Want to discuss your results? Use the contact link below.
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ background: '#FFFBEB', border: '1px solid #FDE68A', borderRadius: 12, padding: '20px 24px', marginTop: 24 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 8, color: '#92400E' }}>
                        📧 Want these results emailed to you?
                    </div>
                    <div style={{ fontSize: 13, color: '#92400E', marginBottom: 16, lineHeight: 1.5 }}>
                        Get a detailed breakdown with framework references and implementation guidance sent to your inbox.
                    </div>
                    <form onSubmit={handleSubmit} style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                        <input
                            type="email"
                            value={email}
                            onChange={e => setEmail(e.target.value)}
                            placeholder="wlong@norrislong.com"
                            required
                            style={{
                                flex: '1 1 200px',
                                padding: '10px 14px',
                                border: '1px solid #FDE68A',
                                borderRadius: 8,
                                fontSize: 14,
                                outline: 'none'
                            }}
                        />
                        <button
                            type="submit"
                            disabled={loading}
                            style={{
                                padding: '10px 20px',
                                background: '#D97706',
                                border: 'none',
                                borderRadius: 8,
                                color: '#fff',
                                fontSize: 14,
                                fontWeight: 600,
                                cursor: loading ? 'default' : 'pointer',
                                opacity: loading ? 0.6 : 1
                            }}
                        >
                            {loading ? 'Sending...' : 'Send Results'}
                        </button>
                        <button
                            type="button"
                            onClick={onSkip}
                            style={{
                                padding: '10px 20px',
                                background: 'transparent',
                                border: '1px solid #FDE68A',
                                borderRadius: 8,
                                color: '#92400E',
                                fontSize: 14,
                                cursor: 'pointer'
                            }}
                        >
                            Skip
                        </button>
                    </form>
                </div>
            );
        }

        // ============================================
        // READINESS EMAIL CAPTURE - EmailJS notification form
        // ============================================
        function ReadinessEmailCapture({ orgName: initialOrgName, orgType, maturity, totalScore, maxPossible, answers }) {
          const [firstName, setFirstName] = useState('');
          const [email, setEmail] = useState('');
          const [org, setOrg] = useState(initialOrgName || '');
          const [canContact, setCanContact] = useState(false);
          const [submitted, setSubmitted] = useState(false);
          const [loading, setLoading] = useState(false);

          useEffect(() => {
            if (document.getElementById('emailjs-sdk')) return;
            const script = document.createElement('script');
            script.id = 'emailjs-sdk';
            script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
            script.onload = () => {
              window.emailjs.init('MfRZ8VHhIQ-X84soy');
            };
            document.head.appendChild(script);
          }, []);

          async function handleSubmit(e) {
            e.preventDefault();
            setLoading(true);

            const domainScores = DOMAINS.map(d => {
              const score = getDomainScore(answers, d.id);
              const maxScore = d.questions.length * 4;
              return `${d.title}: ${score}/${maxScore} (${getDomainLabel(score, maxScore)})`;
            }).join('\n');

            try {
              await window.emailjs.send('service_bkzovo6', 'template_fl8m5he', {
                from_name: firstName,
                from_email: email,
                org_name: org,
                org_type: orgType,
                maturity_level: maturity.level,
                total_score: `${totalScore}/${maxPossible}`,
                domain_scores: domainScores,
              });
            } catch (err) {
              // Fail silently
            }

            setSubmitted(true);
            setLoading(false);
          }

          if (submitted) {
            return (
              <div style={{ background: "linear-gradient(135deg, #0F172A, #1E293B)", borderRadius: 12, padding: "28px 24px", textAlign: "center", color: "#F8FAFC", marginBottom: 24 }}>
                <div style={{ fontSize: 18, fontWeight: 600, fontFamily: "'Source Serif 4', Georgia, serif" }}>
                  Thanks — I'll be in touch.
                </div>
              </div>
            );
          }

          return (
            <div style={{ background: "linear-gradient(135deg, #0F172A, #1E293B)", borderRadius: 12, padding: "28px 24px", color: "#F8FAFC", marginBottom: 24 }}>
              <h3 style={{ fontSize: 18, fontWeight: 600, marginBottom: 8, fontFamily: "'Source Serif 4', Georgia, serif" }}>Want the Full Picture?</h3>
              <p style={{ fontSize: 13, color: "#94A3B8", lineHeight: 1.6, marginBottom: 20 }}>
                Share your details and Bill will follow up with personalized guidance based on your results.
              </p>
              <form onSubmit={handleSubmit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div>
                    <label style={{ display: "block", fontSize: 12, color: "#94A3B8", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>First Name</label>
                    <input
                      type="text"
                      value={firstName}
                      onChange={e => setFirstName(e.target.value)}
                      placeholder="Jane"
                      required
                      style={{ width: "100%", padding: "10px 14px", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.14)", borderRadius: 8, color: "#F8FAFC", fontSize: 14, outline: "none", boxSizing: "border-box" }}
                    />
                  </div>
                  <div>
                    <label style={{ display: "block", fontSize: 12, color: "#94A3B8", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>Email</label>
                    <input
                      type="email"
                      value={email}
                      onChange={e => setEmail(e.target.value)}
                      placeholder="jane@firm.com"
                      required
                      style={{ width: "100%", padding: "10px 14px", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.14)", borderRadius: 8, color: "#F8FAFC", fontSize: 14, outline: "none", boxSizing: "border-box" }}
                    />
                  </div>
                </div>
                <div>
                  <label style={{ display: "block", fontSize: 12, color: "#94A3B8", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>Organization</label>
                  <input
                    type="text"
                    value={org}
                    onChange={e => setOrg(e.target.value)}
                    placeholder="Your firm or company"
                    style={{ width: "100%", padding: "10px 14px", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.14)", borderRadius: 8, color: "#F8FAFC", fontSize: 14, outline: "none", boxSizing: "border-box" }}
                  />
                </div>
                <label style={{ display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer" }}>
                  <input
                    type="checkbox"
                    checked={canContact}
                    onChange={e => setCanContact(e.target.checked)}
                    style={{ marginTop: 2, accentColor: "#2563EB", width: 16, height: 16, flexShrink: 0 }}
                  />
                  <span style={{ fontSize: 13, color: "#CBD5E1", lineHeight: 1.5 }}>
                    Bill Norris may contact me about my results.
                  </span>
                </label>
                <button
                  type="submit"
                  disabled={loading}
                  style={{ padding: "12px 28px", background: "linear-gradient(135deg, #2563EB, #7C3AED)", border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600, cursor: loading ? "default" : "pointer", opacity: loading ? 0.7 : 1, letterSpacing: "0.02em", alignSelf: "flex-start" }}
                >
                  {loading ? "Sending..." : "Send My Results \u2192"}
                </button>
              </form>
            </div>
          );
        }

        // ============================================
        // READINESS ASSESSMENT - Full component from artifact
        // ============================================
        
        const DOMAINS = [
          {
            id: "governance",
            title: "AI Governance & Oversight",
            icon: "⚖️",
            description: "Leadership accountability, policy frameworks, and decision-making structures for AI adoption",
            questions: [
              {
                id: "gov1",
                text: "Has your organization designated a specific individual or committee accountable for AI-related decisions?",
                options: [
                  { value: 1, label: "No — AI decisions happen ad hoc or aren't tracked" },
                  { value: 2, label: "Informally — a few people weigh in, but no formal role" },
                  { value: 3, label: "Yes — someone owns it, but scope and authority are unclear" },
                  { value: 4, label: "Yes — defined role with clear authority and reporting lines" },
                ],
                insight: "Without clear ownership, AI risk becomes everyone's problem and no one's priority.",
              },
              {
                id: "gov2",
                text: "Do you have a written policy governing how employees can use AI tools (e.g., ChatGPT, Copilot, Claude)?",
                options: [
                  { value: 1, label: "No policy exists" },
                  { value: 2, label: "Informal guidance — verbal or in Slack, not documented" },
                  { value: 3, label: "Written policy exists but hasn't been reviewed in 6+ months" },
                  { value: 4, label: "Current, documented policy with regular review cycles" },
                ],
                insight: "80%+ of organizations have employees using AI tools before any policy exists. The risk isn't adoption — it's unmanaged adoption.",
              },
              {
                id: "gov3",
                text: "How does leadership evaluate whether a new AI use case is appropriate for your organization?",
                options: [
                  { value: 1, label: "No evaluation process — people just start using tools" },
                  { value: 2, label: "Case-by-case discussion, no consistent criteria" },
                  { value: 3, label: "Some criteria exist (data sensitivity, client impact) but applied inconsistently" },
                  { value: 4, label: "Defined intake process with risk tiers and approval workflows" },
                ],
                insight: "A tiered approach — low-risk uses get fast approval, high-risk uses get scrutiny — balances innovation with control.",
              },
            ],
          },
          {
            id: "risk",
            title: "Risk Awareness & Assessment",
            icon: "🔍",
            description: "Understanding of AI-specific risks including bias, hallucination, data leakage, and regulatory exposure",
            questions: [
              {
                id: "risk1",
                text: "Can your team articulate the specific risks of using AI in your core business processes?",
                options: [
                  { value: 1, label: "Most people couldn't name AI-specific risks beyond 'it might be wrong'" },
                  { value: 2, label: "Some awareness of risks like hallucination and data leakage" },
                  { value: 3, label: "Key staff understand risks; documented for major use cases" },
                  { value: 4, label: "Risk taxonomy exists, mapped to business processes, reviewed regularly" },
                ],
                insight: "The most dangerous AI risk is the one your team doesn't know to look for. Hallucination is obvious — training data leakage and prompt injection are not.",
              },
              {
                id: "risk2",
                text: "Have you assessed which of your data sets or workflows are too sensitive for current AI tools?",
                options: [
                  { value: 1, label: "No — we haven't thought about data classification for AI" },
                  { value: 2, label: "General sense of what's sensitive, but no formal classification" },
                  { value: 3, label: "Data classified, but AI-specific boundaries not defined" },
                  { value: 4, label: "Clear data classification with explicit AI usage boundaries per tier" },
                ],
                insight: "Data classification isn't new — but AI changes the calculus. A dataset safe for internal analytics may be unsafe for an LLM that could memorize and regurgitate it.",
              },
              {
                id: "risk3",
                text: "Do you monitor AI outputs for accuracy, bias, or other quality issues in production use?",
                options: [
                  { value: 1, label: "No monitoring — we trust the output" },
                  { value: 2, label: "Users spot-check informally" },
                  { value: 3, label: "Some systematic review for high-stakes outputs" },
                  { value: 4, label: "Defined quality assurance process with metrics and escalation paths" },
                ],
                insight: "AI doesn't fail like traditional software — it fails confidently. Without monitoring, you won't know it's wrong until a client or regulator tells you.",
              },
            ],
          },
          {
            id: "data",
            title: "Data Governance & Privacy",
            icon: "🔐",
            description: "Controls around data flowing into and out of AI systems, including client confidentiality and regulatory compliance",
            questions: [
              {
                id: "data1",
                text: "Do you know where your data goes when employees use AI tools — including whether it's used for model training?",
                options: [
                  { value: 1, label: "No visibility into data flows to AI providers" },
                  { value: 2, label: "General awareness but haven't reviewed vendor terms" },
                  { value: 3, label: "Reviewed terms for primary AI tools; some data flow mapping" },
                  { value: 4, label: "Complete data flow mapping with contractual protections and opt-outs confirmed" },
                ],
                insight: "Most AI providers' default terms allow training on your inputs. For firms handling client data, this is a confidentiality breach waiting to happen.",
              },
              {
                id: "data2",
                text: "How do you ensure client-confidential or regulated data (PHI, PII, financial records) stays out of unauthorized AI tools?",
                options: [
                  { value: 1, label: "No controls — employees use their judgment" },
                  { value: 2, label: "Policy says 'don't put sensitive data in AI' but no technical controls" },
                  { value: 3, label: "Some technical controls (approved tools list, DLP) plus policy" },
                  { value: 4, label: "Layered controls: approved tools, DLP, access restrictions, monitoring, and training" },
                ],
                insight: "Policy without technical controls is a suggestion. For regulated data, you need both the rule and the guardrail.",
              },
              {
                id: "data3",
                text: "Could you demonstrate to a client or regulator exactly how AI was used in a specific engagement or process?",
                options: [
                  { value: 1, label: "No — we have no record of AI usage" },
                  { value: 2, label: "Partially — some teams document AI usage informally" },
                  { value: 3, label: "Mostly — documentation requirements exist but compliance varies" },
                  { value: 4, label: "Yes — systematic logging of AI usage with audit trail" },
                ],
                insight: "Regulators aren't asking 'did you use AI?' yet. They're going to ask 'can you prove your AI-assisted work product is reliable?' Be ready.",
              },
            ],
          },
          {
            id: "people",
            title: "AI-Human Collaboration",
            icon: "🤝",
            description: "How your people work alongside AI — trust calibration, override capability, shared decision-making, and evolving professional judgment",
            questions: [
              {
                id: "ppl1",
                text: "When AI and a human professional disagree on a judgment call, does your organization have a defined process for resolving it?",
                options: [
                  { value: 1, label: "No — the human either accepts or ignores the AI output with no documented reasoning" },
                  { value: 2, label: "Informally — experienced staff override AI when they feel it's wrong, but nothing is tracked" },
                  { value: 3, label: "Partially — high-risk workflows have escalation paths; most don't" },
                  { value: 4, label: "Yes — documented disagreement resolution with override rationale captured for learning" },
                ],
                insight: "The AI-human handoff isn't a one-time event — it's a continuous negotiation. Organizations that capture *why* humans override AI build institutional knowledge that makes both the humans and the AI better over time.",
              },
              {
                id: "ppl2",
                text: "How does your organization calibrate trust in AI outputs — do people know when to lean on AI versus when to rely on their own expertise?",
                options: [
                  { value: 1, label: "No calibration — people either trust AI completely or don't use it at all" },
                  { value: 2, label: "Informal — experienced staff have intuitions, but there's no shared framework" },
                  { value: 3, label: "Some guidance exists on AI confidence levels and when human judgment should take precedence" },
                  { value: 4, label: "Trust calibration is role-specific: staff know exactly which tasks AI handles well and where human judgment is essential" },
                ],
                insight: "Undertrust wastes AI's potential. Overtrust creates liability. The goal isn't 'use more AI' — it's knowing precisely where AI adds value and where professional judgment is non-negotiable.",
              },
              {
                id: "ppl3",
                text: "Are your professionals developing new skills for an AI-augmented work environment — not just prompting, but critical evaluation, workflow design, and AI oversight?",
                options: [
                  { value: 1, label: "No — AI skills aren't part of professional development" },
                  { value: 2, label: "Ad hoc — a few champions are self-teaching; no organizational investment" },
                  { value: 3, label: "Training covers AI tool usage but not deeper collaboration skills like output evaluation or workflow architecture" },
                  { value: 4, label: "Structured development: prompt engineering, critical evaluation, AI workflow design, and oversight competency are all addressed" },
                ],
                insight: "The next generation of professionals won't just use AI — they'll architect human-AI workflows. 'Prompt engineering' is table stakes. The real differentiator is knowing how to design processes where AI and human judgment reinforce each other.",
              },
            ],
          },
          {
            id: "ops",
            title: "Operational Readiness",
            icon: "⚙️",
            description: "Technical infrastructure, vendor management, and the ability to implement AI responsibly at scale",
            questions: [
              {
                id: "ops1",
                text: "Do you have an inventory of all AI tools currently in use across your organization — including shadow AI?",
                options: [
                  { value: 1, label: "No inventory — we don't know what's being used" },
                  { value: 2, label: "Aware of major tools, but shadow AI is likely" },
                  { value: 3, label: "Formal inventory of sanctioned tools; some shadow AI detection" },
                  { value: 4, label: "Complete inventory with discovery processes for unsanctioned use" },
                ],
                insight: "Shadow AI is today's version of shadow IT — except it's faster to adopt and harder to detect. If you're not looking for it, it's already there.",
              },
              {
                id: "ops2",
                text: "How do you evaluate and approve AI vendors — beyond 'it works well in a demo'?",
                options: [
                  { value: 1, label: "No vendor evaluation process specific to AI" },
                  { value: 2, label: "Standard vendor review, but doesn't address AI-specific risks" },
                  { value: 3, label: "AI-specific criteria exist (data handling, model transparency, etc.)" },
                  { value: 4, label: "Comprehensive AI vendor assessment covering security, privacy, reliability, and contractual terms" },
                ],
                insight: "An AI vendor's SOC 2 report tells you about their infrastructure controls. It doesn't tell you about model behavior, training data practices, or output reliability.",
              },
              {
                id: "ops3",
                text: "Do you have a plan for what happens when an AI tool fails, produces harmful output, or a vendor changes terms?",
                options: [
                  { value: 1, label: "No contingency planning for AI-specific incidents" },
                  { value: 2, label: "General incident response would apply, but nothing AI-specific" },
                  { value: 3, label: "Some AI scenarios included in business continuity or incident response" },
                  { value: 4, label: "AI-specific incident response, vendor contingency, and business continuity plans" },
                ],
                insight: "When OpenAI changes their data retention policy or your AI vendor gets acquired, you need a response plan — not a scramble.",
              },
              {
                id: "ops4",
                text: "If you deploy or plan to deploy AI agents — systems that take actions autonomously (API calls, data writes, workflow execution) — do you have human-in-the-loop controls and circuit breakers?",
                options: [
                  { value: 1, label: "We haven't considered autonomous AI agents or don't know what they are" },
                  { value: 2, label: "Aware of agentic AI but no controls framework — agents would use the same rules as chatbots" },
                  { value: 3, label: "Some guardrails exist: approval gates for high-impact actions, logging of agent activity" },
                  { value: 4, label: "Comprehensive agent governance: action boundaries, HITL triggers, kill switches, audit trails, and scope limits" },
                ],
                insight: "A chatbot that hallucinates is embarrassing. An agent that hallucinates can execute — moving money, sending emails, modifying records. Agentic AI requires fundamentally different controls than conversational AI.",
              },
            ],
          },
        ];

        const MATURITY_LEVELS = [
          { min: 16, max: 25, level: "Ad Hoc", color: "#DC2626", bg: "#FEF2F2", border: "#FECACA", description: "AI adoption is happening, but without structure. This is where most organizations are — and it's a significant risk position. The gap between AI usage and AI governance is where incidents happen." },
          { min: 26, max: 38, level: "Developing", color: "#D97706", bg: "#FFFBEB", border: "#FDE68A", description: "You've started thinking about AI governance but lack consistency. Policies may exist on paper but aren't operationalized. This is the most common — and most actionable — stage." },
          { min: 39, max: 51, level: "Defined", color: "#2563EB", bg: "#EFF6FF", border: "#BFDBFE", description: "Governance structures are in place and mostly followed. The foundation is solid — now it's about consistency, measurement, and continuous improvement." },
          { min: 52, max: 64, level: "Managed", color: "#059669", bg: "#ECFDF5", border: "#A7F3D0", description: "Comprehensive AI governance with measurable controls. You're ahead of most organizations — focus on maintaining this through rapid AI evolution and demonstrating value." },
        ];

        function getMaturityLevel(score) {
          return MATURITY_LEVELS.find(l => score >= l.min && score <= l.max) || MATURITY_LEVELS[0];
        }

        function getDomainScore(answers, domainId) {
          const domain = DOMAINS.find(d => d.id === domainId);
          return domain.questions.reduce((sum, q) => sum + (answers[q.id] || 0), 0);
        }

        function getDomainLabel(score, maxScore) {
          const pct = score / maxScore;
          if (pct <= 0.33) return "Critical Gap";
          if (pct <= 0.58) return "Developing";
          if (pct <= 0.83) return "Established";
          return "Mature";
        }

        function getDomainColor(score, maxScore) {
          const pct = score / maxScore;
          if (pct <= 0.33) return "#DC2626";
          if (pct <= 0.58) return "#D97706";
          if (pct <= 0.83) return "#2563EB";
          return "#059669";
        }

        const priorityRecommendations = {
          governance: {
            low: [
              "Designate an AI governance owner — even if it's a part-time role, someone needs to own this.",
              "Draft a minimum viable AI acceptable use policy. Start with what's prohibited, then expand.",
              "Create a simple intake form for new AI use cases: what data, what risk, who approves.",
            ],
            mid: [
              "Formalize your AI governance committee or expand the existing owner's mandate.",
              "Implement tiered approval workflows — not everything needs the same scrutiny.",
              "Schedule quarterly policy reviews; AI capabilities change faster than annual cycles allow.",
            ],
            high: [
              "Benchmark your governance model against NIST AI RMF and ISO 42001 for continuous improvement.",
              "Integrate AI governance reporting into board-level risk discussions.",
            ],
          },

        function getRecommendations(answers) {
          const results = [];
          DOMAINS.forEach(domain => {
            const score = getDomainScore(answers, domain.id);
            const maxScore = domain.questions.length * 4;
            const pct = score / maxScore;
            const recs = priorityRecommendations[domain.id];
            let items;
            if (pct <= 0.42) items = recs.low;
            else if (pct <= 0.75) items = recs.mid;
            else items = recs.high;
            results.push({ domain: domain.title, icon: domain.icon, score, maxScore, items });
          });
          results.sort((a, b) => (a.score / a.maxScore) - (b.score / b.maxScore));
          return results;
        }

        function RadarChart({ answers }) {
          const cx = 150, cy = 150, r = 110;
          const domains = DOMAINS.map((d, i) => {
            const score = getDomainScore(answers, d.id);
            const maxScore = d.questions.length * 4;
            const angle = (Math.PI * 2 * i) / DOMAINS.length - Math.PI / 2;
            return { ...d, score, maxScore, angle, ratio: score / maxScore };
          });

          const rings = [0.25, 0.5, 0.75, 1.0];
          const points = domains.map(d => ({
            x: cx + Math.cos(d.angle) * r * d.ratio,
            y: cy + Math.sin(d.angle) * r * d.ratio,
          }));
          const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ") + " Z";

          return (
            <svg viewBox="0 0 300 300" style={{ width: "100%", maxWidth: 340, margin: "0 auto", display: "block" }}>
              {rings.map((ring, i) => (
                <polygon
                  key={i}
                  points={domains.map(d => `${cx + Math.cos(d.angle) * r * ring},${cy + Math.sin(d.angle) * r * ring}`).join(" ")}
                  fill="none"
                  stroke="#E2E8F0"
                  strokeWidth="1"
                />
              ))}
              {domains.map((d, i) => (
                <line key={i} x1={cx} y1={cy} x2={cx + Math.cos(d.angle) * r} y2={cy + Math.sin(d.angle) * r} stroke="#E2E8F0" strokeWidth="1" />
              ))}
              <path d={pathD} fill="rgba(37, 99, 235, 0.12)" stroke="#2563EB" strokeWidth="2" />
              {points.map((p, i) => (
                <circle key={i} cx={p.x} cy={p.y} r="4" fill="#2563EB" />
              ))}
              {domains.map((d, i) => {
                const labelR = r + 28;
                const x = cx + Math.cos(d.angle) * labelR;
                const y = cy + Math.sin(d.angle) * labelR;
                return (
                  <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill="#475569" fontWeight="500">
                    {d.icon}
                  </text>
                );
              })}
            </svg>
          );
        }

        function DomainBars({ answers }) {
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {DOMAINS.map(domain => {
                const score = getDomainScore(answers, domain.id);
                const maxScore = domain.questions.length * 4;
                const pct = (score / maxScore) * 100;
                const color = getDomainColor(score, maxScore);
                return (
                  <div key={domain.id}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 13 }}>
                      <span style={{ color: "#334155", fontWeight: 500 }}>{domain.icon} {domain.title}</span>
                      <span style={{ color, fontWeight: 600 }}>{getDomainLabel(score, maxScore)} ({score}/{maxScore})</span>

                    <div style={{ height: 8, background: "#F1F5F9", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 4, transition: "width 0.6s ease" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          );
        }

const TOTAL_CONTROLS = ALL_CONTROLS.length;

function getOverallScore(answers) {
  const vals = Object.values(answers);
  if (vals.length === 0) return 0;
  return vals.reduce((a, b) => a + b, 0);
}

function getMaxScore() { return TOTAL_CONTROLS * 5; }

function getDomainAvg(answers, domainId) {
  const domain = CONTROL_DOMAINS.find(d => d.id === domainId);
  const scores = domain.controls.map(c => answers[c.id]).filter(v => v !== undefined);
  if (scores.length === 0) return 0;
  return scores.reduce((a, b) => a + b, 0) / scores.length;
}

function getMaturityLabel(avg) {
  if (avg < 1) return { label: "Not Started", color: "#94A3B8" };
  if (avg < 2) return { label: "Initial", color: "#DC2626" };
  if (avg < 3) return { label: "Developing", color: "#D97706" };
  if (avg < 4) return { label: "Defined", color: "#2563EB" };
  if (avg < 4.5) return { label: "Managed", color: "#059669" };
  return { label: "Optimizing", color: "#047857" };
}

function HeatmapCell({ value, onClick, isActive }) {
  const colors = ["#F1F5F9", "#FEE2E2", "#FED7AA", "#BFDBFE", "#BBF7D0", "#6EE7B7"];
  const bg = value !== undefined ? colors[value] : "#F8FAFC";
  const textColors = ["#94A3B8", "#DC2626", "#D97706", "#2563EB", "#059669", "#047857"];
  const tc = value !== undefined ? textColors[value] : "#CBD5E1";
  return (
    <div
      onClick={onClick}
      style={{
        width: 36, height: 36, borderRadius: 6, background: bg,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 12, fontWeight: 600, color: tc, cursor: "pointer",
        border: isActive ? "2px solid #0F172A" : "1px solid #E2E8F0",
        transition: "all 0.15s ease",
      }}
      onMouseEnter={e => { if (!isActive) e.target.style.transform = "scale(1.1)"; }}
      onMouseLeave={e => { e.target.style.transform = "scale(1)"; }}
    >
      {value !== undefined ? value : "–"}
    </div>
  );
}

        {/* Framework mapping */}
        <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #E2E8F0", padding: 24, marginBottom: 24 }}>
          <h3 style={{ fontSize: 16, fontWeight: 600, marginBottom: 12, fontFamily: "'Source Serif 4', Georgia, serif" }}>Framework Cross-Reference</h3>
          <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.6 }}>
            <p style={{ marginBottom: 12 }}>This assessment maps {TOTAL_CONTROLS} controls to three leading AI governance frameworks. Each control includes specific clause references enabling direct traceability for audit and compliance purposes.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              {[
                { name: "NIST AI RMF 1.0", desc: "4 core functions (Govern, Map, Measure, Manage) with 19 categories and 72 subcategories", color: "#2563EB" },
                { name: "ISO/IEC 42001:2023", desc: "AI management system requirements with Annex A controls for responsible AI", color: "#7C3AED" },
                { name: "CSA AICM v1.0", desc: "Cloud-specific AI controls extending CCM for AI workload security and governance", color: "#059669" },
              ].map((fw, i) => (
                <div key={i} style={{ padding: 14, borderRadius: 8, border: `1px solid ${fw.color}22`, background: `${fw.color}06` }}>
                  <div style={{ fontWeight: 600, fontSize: 13, color: fw.color, marginBottom: 4 }}>{fw.name}</div>
                  <div style={{ fontSize: 11, color: "#64748B", lineHeight: 1.5 }}>{fw.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Restart */}
        <div style={{ textAlign: "center" }}>
          <button
            onClick={() => { setPhase("assess"); setViewMode("heatmap"); }}
            style={{ padding: "10px 20px", border: "1px solid #E2E8F0", borderRadius: 8, background: "#fff", color: "#475569", fontSize: 13, cursor: "pointer" }}
          >
            ← Back to Assessment
          </button>
        </div>

        <p style={{ textAlign: "center", fontSize: 11, color: "#94A3B8", marginTop: 24 }}>
          Mapped to NIST AI RMF 1.0 · ISO/IEC 42001:2023 · CSA AI Controls Matrix v1.0
        </p>
      </div>
    </div>
  );
}

        // ============================================
        // MAIN APP ROUTER
        // ============================================
        
        function App() {
            const [currentView, setCurrentView] = useState('readiness');
            
            return (
                <div>
                    {currentView === 'readiness' && <AIReadinessAssessment onNavigate={setCurrentView} />}
                    {currentView === 'controls' && <AIControlsFramework onNavigate={setCurrentView} />}
                </div>
            );
        }

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
